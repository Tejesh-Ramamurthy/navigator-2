<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Radar Navigator</title>
<script src="https://cdn.jsdelivr.net/npm/@turf/turf@6/turf.min.js"></script>
<style>
*, *::before, *::after {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

html, body {
  height: 100%;
  overflow: hidden;
  touch-action: manipulation;
}

body {
  background: #0a0a0f;
  color: #fff;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
  display: flex;
  flex-direction: column;
  align-items: center;
  user-select: none;
  -webkit-user-select: none;
}

/* ── Admin Button ── */
#admin-btn {
  position: fixed;
  top: 14px;
  right: 14px;
  background: transparent;
  color: #444;
  border: 1px solid #222;
  padding: 7px 14px;
  border-radius: 14px;
  font-size: 11px;
  letter-spacing: 0.5px;
  cursor: pointer;
  z-index: 50;
  transition: border-color 0.2s, color 0.2s;
}

#admin-btn:active {
  border-color: #555;
  color: #888;
}

/* ── Distance Display ── */
#distance-section {
  margin-top: 50px;
  text-align: center;
}

#distance-section .label {
  font-size: 10px;
  color: #555;
  text-transform: uppercase;
  letter-spacing: 3px;
}

#distance-value {
  font-size: 54px;
  font-weight: 200;
  margin-top: 6px;
  font-variant-numeric: tabular-nums;
  line-height: 1;
  min-height: 58px;
  color: #e0e0e0;
}

/* ── Radar ── */
#radar-wrap {
  position: relative;
  margin-top: 24px;
  display: flex;
  align-items: center;
  justify-content: center;
}

#radar-canvas {
  display: block;
}

/* ── Bearing Display ── */
#bearing-section {
  margin-top: 16px;
  text-align: center;
}

#bearing-section .label {
  font-size: 10px;
  color: #444;
  text-transform: uppercase;
  letter-spacing: 2px;
}

#bearing-value {
  font-size: 22px;
  font-weight: 300;
  margin-top: 3px;
  font-variant-numeric: tabular-nums;
  color: #777;
}

/* ── Controls ── */
#controls {
  margin-top: 28px;
  display: flex;
  gap: 14px;
}

.btn {
  background: transparent;
  color: #aaa;
  border: 1px solid #333;
  padding: 13px 28px;
  border-radius: 26px;
  font-size: 13px;
  cursor: pointer;
  transition: background 0.2s, border-color 0.2s, color 0.2s;
  letter-spacing: 0.3px;
}

.btn:active {
  background: rgba(255,255,255,0.04);
}

.btn.running {
  border-color: #00e676;
  color: #00e676;
}

/* ── Status ── */
#status {
  position: fixed;
  bottom: 20px;
  font-size: 10px;
  color: #2a2a2a;
  letter-spacing: 0.5px;
  text-align: center;
  padding: 0 20px;
}

/* ── Arrival Banner ── */
#arrival-banner {
  display: none;
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  padding: 12px 20px;
  background: rgba(0,230,118,0.12);
  border-bottom: 1px solid rgba(0,230,118,0.25);
  text-align: center;
  font-size: 14px;
  color: #00e676;
  font-weight: 400;
  letter-spacing: 0.5px;
  z-index: 40;
}

#arrival-banner.show {
  display: block;
}

/* ── Admin Panel ── */
#admin-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(5,5,10,0.96);
  z-index: 200;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 28px;
}

#admin-overlay.open {
  display: flex;
}

#admin-overlay h2 {
  font-size: 18px;
  font-weight: 300;
  margin-bottom: 28px;
  color: #888;
  letter-spacing: 1px;
}

.field {
  width: 100%;
  max-width: 300px;
  margin-bottom: 18px;
}

.field label {
  display: block;
  font-size: 10px;
  color: #555;
  text-transform: uppercase;
  letter-spacing: 1.5px;
  margin-bottom: 5px;
}

.field input[type="number"] {
  width: 100%;
  background: #111118;
  border: 1px solid #2a2a2a;
  color: #fff;
  padding: 11px 14px;
  border-radius: 8px;
  font-size: 15px;
  outline: none;
  -webkit-appearance: none;
}

.field input[type="number"]:focus {
  border-color: #444;
}

.field input[type="range"] {
  width: 100%;
  accent-color: #00e676;
  margin-top: 2px;
}

.field .rv {
  font-size: 12px;
  color: #666;
  margin-top: 3px;
  text-align: right;
}

#admin-btns {
  display: flex;
  gap: 12px;
  margin-top: 12px;
}

#compass-status {
  width: 100%;
  max-width: 300px;
  margin-bottom: 18px;
  padding: 10px 14px;
  border-radius: 8px;
  background: #111118;
  border: 1px solid #2a2a2a;
  font-size: 11px;
  color: #555;
  text-align: center;
  letter-spacing: 0.5px;
}
</style>
</head>
<body>

<button id="admin-btn">Admin</button>

<div id="arrival-banner">You have arrived</div>

<div id="distance-section">
  <div class="label">Distance to Target</div>
  <div id="distance-value">---</div>
</div>

<div id="radar-wrap">
  <canvas id="radar-canvas"></canvas>
</div>

<div id="bearing-section">
  <div class="label">Bearing</div>
  <div id="bearing-value">---</div>
</div>

<div id="controls">
  <button class="btn" id="start-btn">Start Navigation</button>
  <button class="btn" id="recalibrate-btn">Recalibrate</button>
</div>

<div id="status">Waiting to start</div>

<!-- Admin Panel -->
<div id="admin-overlay">
  <h2>Configuration</h2>
  <div id="compass-status">Compass: checking…</div>
  <div class="field">
    <label>Target Latitude</label>
    <input type="number" id="inp-lat" step="0.000001" placeholder="40.748817">
  </div>
  <div class="field">
    <label>Target Longitude</label>
    <input type="number" id="inp-lng" step="0.000001" placeholder="-73.985428">
  </div>
  <div class="field">
    <label>Needle Smoothing</label>
    <input type="range" id="inp-smooth" min="0.02" max="0.35" step="0.01" value="0.10">
    <div class="rv" id="rv-smooth">0.10</div>
  </div>
  <div class="field">
    <label>Arrival Radius (meters)</label>
    <input type="range" id="inp-arrival" min="5" max="100" step="1" value="15">
    <div class="rv" id="rv-arrival">15 m</div>
  </div>
  <div id="admin-btns">
    <button class="btn" id="btn-save">Save</button>
    <button class="btn" id="btn-close">Close</button>
  </div>
</div>

<script>
(function() {
  'use strict';

  /* ══════════════════════════════════════
     STATE
     ══════════════════════════════════════ */
  var S = {
    active: false,
    userLat: null,
    userLng: null,
    compassHeading: 0,         // magnetometer heading (0-360)
    hasCompass: false,
    targetLat: 40.748817,
    targetLng: -73.985428,
    smoothing: 0.10,
    arrivalRadius: 15,         // meters
    arrived: false,
    displayAngle: 0,           // smoothed relative angle for radar dot
    targetBearing: 0,          // absolute bearing to target
    distance: null,
    watchId: null,
    headingOffset: 0,          // manual calibration offset
    sweep: 0,
    lastCompassRaw: 0          // for calibration
  };

  /* ══════════════════════════════════════
     SETTINGS PERSISTENCE
     ══════════════════════════════════════ */
  function loadSettings() {
    try {
      var d = JSON.parse(localStorage.getItem('rnav2'));
      if (d) {
        if (d.lat != null) S.targetLat = d.lat;
        if (d.lng != null) S.targetLng = d.lng;
        if (d.sm != null) S.smoothing = d.sm;
        if (d.ar != null) S.arrivalRadius = d.ar;
      }
    } catch(e) {}
  }

  function saveSettings() {
    localStorage.setItem('rnav2', JSON.stringify({
      lat: S.targetLat, lng: S.targetLng,
      sm: S.smoothing, ar: S.arrivalRadius
    }));
  }

  /* ══════════════════════════════════════
     DOM
     ══════════════════════════════════════ */
  var canvas     = document.getElementById('radar-canvas');
  var ctx        = canvas.getContext('2d');
  var distEl     = document.getElementById('distance-value');
  var bearingEl  = document.getElementById('bearing-value');
  var startBtn   = document.getElementById('start-btn');
  var recalBtn   = document.getElementById('recalibrate-btn');
  var statusEl   = document.getElementById('status');
  var arrivalEl  = document.getElementById('arrival-banner');

  // admin
  var adminBtn     = document.getElementById('admin-btn');
  var overlay      = document.getElementById('admin-overlay');
  var btnSave      = document.getElementById('btn-save');
  var btnClose     = document.getElementById('btn-close');
  var inpLat       = document.getElementById('inp-lat');
  var inpLng       = document.getElementById('inp-lng');
  var inpSmooth    = document.getElementById('inp-smooth');
  var rvSmooth     = document.getElementById('rv-smooth');
  var inpArrival   = document.getElementById('inp-arrival');
  var rvArrival    = document.getElementById('rv-arrival');
  var compassStat  = document.getElementById('compass-status');

  /* ══════════════════════════════════════
     CANVAS SIZING
     ══════════════════════════════════════ */
  var RAD, cx, cy, dotR;

  function sizeCanvas() {
    var maxW = window.innerWidth - 40;
    var maxH = window.innerHeight - 340;
    var sz = Math.max(200, Math.min(maxW, maxH, 400));
    var dpr = window.devicePixelRatio || 1;
    canvas.width  = sz * dpr;
    canvas.height = sz * dpr;
    canvas.style.width  = sz + 'px';
    canvas.style.height = sz + 'px';
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    RAD  = (sz / 2) - 20;
    cx   = sz / 2;
    cy   = sz / 2;
    dotR = Math.max(7, sz * 0.024);
  }

  /* ══════════════════════════════════════
     DRAWING
     ══════════════════════════════════════ */
  function draw() {
    var w = parseFloat(canvas.style.width);
    var h = parseFloat(canvas.style.height);
    ctx.clearRect(0, 0, w, h);

    // ── concentric rings ──
    for (var i = 1; i <= 4; i++) {
      ctx.beginPath();
      ctx.arc(cx, cy, (RAD / 4) * i, 0, Math.PI * 2);
      if (i === 4) {
        ctx.strokeStyle = 'rgba(0,230,118,0.25)';
        ctx.lineWidth = 1.5;
      } else {
        ctx.strokeStyle = 'rgba(0,230,118,0.06)';
        ctx.lineWidth = 0.5;
      }
      ctx.stroke();
    }

    // ── crosshairs ──
    ctx.strokeStyle = 'rgba(0,230,118,0.05)';
    ctx.lineWidth = 0.5;
    ctx.beginPath();
    ctx.moveTo(cx, cy - RAD); ctx.lineTo(cx, cy + RAD);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(cx - RAD, cy); ctx.lineTo(cx + RAD, cy);
    ctx.stroke();

    // ── diagonal crosshairs ──
    var d45 = RAD * 0.707;
    ctx.strokeStyle = 'rgba(0,230,118,0.03)';
    ctx.beginPath();
    ctx.moveTo(cx - d45, cy - d45); ctx.lineTo(cx + d45, cy + d45);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(cx + d45, cy - d45); ctx.lineTo(cx - d45, cy + d45);
    ctx.stroke();

    // ── sweep line ──
    if (S.active) {
      ctx.save();
      ctx.translate(cx, cy);
      ctx.rotate(S.sweep);
      var sg = ctx.createLinearGradient(0, 0, RAD, 0);
      sg.addColorStop(0, 'rgba(0,230,118,0.18)');
      sg.addColorStop(1, 'rgba(0,230,118,0)');
      ctx.strokeStyle = sg;
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(0, 0); ctx.lineTo(RAD, 0);
      ctx.stroke();

      // sweep trail
      for (var t = 1; t <= 10; t++) {
        ctx.rotate(-0.035);
        var a = 0.12 - t * 0.011;
        if (a <= 0) break;
        var tg = ctx.createLinearGradient(0, 0, RAD, 0);
        tg.addColorStop(0, 'rgba(0,230,118,' + a + ')');
        tg.addColorStop(1, 'rgba(0,230,118,0)');
        ctx.strokeStyle = tg;
        ctx.beginPath();
        ctx.moveTo(0, 0); ctx.lineTo(RAD, 0);
        ctx.stroke();
      }
      ctx.restore();
    }

    // ── center user marker ──
    ctx.beginPath();
    ctx.arc(cx, cy, 4, 0, Math.PI * 2);
    ctx.fillStyle = '#fff';
    ctx.fill();
    ctx.beginPath();
    ctx.arc(cx, cy, 9, 0, Math.PI * 2);
    ctx.strokeStyle = 'rgba(255,255,255,0.15)';
    ctx.lineWidth = 1;
    ctx.stroke();

    // ── forward indicator (small triangle at top edge) ──
    ctx.beginPath();
    ctx.moveTo(cx, cy - RAD - 13);
    ctx.lineTo(cx - 5, cy - RAD - 5);
    ctx.lineTo(cx + 5, cy - RAD - 5);
    ctx.closePath();
    ctx.fillStyle = 'rgba(0,230,118,0.5)';
    ctx.fill();

    // ── target dot ──
    if (S.active && S.userLat !== null) {
      var aRad = S.displayAngle * (Math.PI / 180);
      // map distance to radar radius (closer = nearer to center)
      var distFraction = 1;
      if (S.distance !== null) {
        // logarithmic scale: within ~20m maps to center, 1km+ maps to edge
        var maxDist = 1000; // meters
        var dMeters = S.distance * 1000;
        if (dMeters < S.arrivalRadius) {
          distFraction = 0.08;
        } else {
          distFraction = Math.min(1, 0.15 + 0.85 * (Math.log(dMeters) / Math.log(maxDist)));
        }
      }
      var dotDist = RAD * distFraction;
      var tx = cx + dotDist * Math.sin(aRad);
      var ty = cy - dotDist * Math.cos(aRad);

      // outer glow
      var glow = ctx.createRadialGradient(tx, ty, 0, tx, ty, dotR + 16);
      glow.addColorStop(0, S.arrived ? 'rgba(0,230,118,0.30)' : 'rgba(255,59,59,0.25)');
      glow.addColorStop(1, 'rgba(0,0,0,0)');
      ctx.beginPath();
      ctx.arc(tx, ty, dotR + 16, 0, Math.PI * 2);
      ctx.fillStyle = glow;
      ctx.fill();

      // pulse ring
      var pulse = 0.5 + 0.5 * Math.sin(Date.now() / 300);
      ctx.beginPath();
      ctx.arc(tx, ty, dotR + 3 + pulse * 6, 0, Math.PI * 2);
      var pulseColor = S.arrived ? 'rgba(0,230,118,' : 'rgba(255,59,59,';
      ctx.strokeStyle = pulseColor + (0.35 - pulse * 0.25).toFixed(2) + ')';
      ctx.lineWidth = 1;
      ctx.stroke();

      // dot
      ctx.beginPath();
      ctx.arc(tx, ty, dotR, 0, Math.PI * 2);
      ctx.fillStyle = S.arrived ? '#00e676' : '#ff3b3b';
      ctx.fill();

      // bright center
      ctx.beginPath();
      ctx.arc(tx, ty, dotR * 0.35, 0, Math.PI * 2);
      ctx.fillStyle = 'rgba(255,255,255,0.5)';
      ctx.fill();

      // ── direction line from center to dot ──
      ctx.beginPath();
      ctx.moveTo(cx, cy);
      ctx.lineTo(tx, ty);
      var lineColor = S.arrived ? 'rgba(0,230,118,0.08)' : 'rgba(255,59,59,0.08)';
      ctx.strokeStyle = lineColor;
      ctx.lineWidth = 1;
      ctx.setLineDash([4, 6]);
      ctx.stroke();
      ctx.setLineDash([]);
    }
  }

  /* ══════════════════════════════════════
     ANGLE MATH
     ══════════════════════════════════════ */

  // relative angle in -180..180
  function relAngle(targetBearing, compassHeading) {
    return ((targetBearing - compassHeading + 540) % 360) - 180;
  }

  // shortest delta from → to, in -180..180
  function shortDelta(from, to) {
    var d = to - from;
    while (d > 180)  d -= 360;
    while (d < -180) d += 360;
    return d;
  }

  /* ══════════════════════════════════════
     NAVIGATION UPDATE
     ══════════════════════════════════════ */
  function updateNav() {
    if (!S.active || S.userLat === null) return;

    var uPt = turf.point([S.userLng, S.userLat]);
    var tPt = turf.point([S.targetLng, S.targetLat]);

    // distance
    var dKm = turf.distance(uPt, tPt);
    S.distance = dKm;
    var dMeters = dKm * 1000;

    // format distance display
    if (dMeters < 1) {
      distEl.textContent = '< 1 m';
    } else if (dKm < 1) {
      distEl.textContent = Math.round(dMeters) + ' m';
    } else if (dKm < 10) {
      distEl.textContent = dKm.toFixed(2) + ' km';
    } else {
      distEl.textContent = dKm.toFixed(1) + ' km';
    }

    // arrival check
    var wasArrived = S.arrived;
    S.arrived = dMeters <= S.arrivalRadius;
    if (S.arrived && !wasArrived) {
      arrivalEl.classList.add('show');
    } else if (!S.arrived && wasArrived) {
      arrivalEl.classList.remove('show');
    }

    // bearing to target (0-360)
    var tBear = turf.bearing(uPt, tPt);
    tBear = (tBear + 360) % 360;
    S.targetBearing = tBear;

    // display bearing
    bearingEl.textContent = Math.round(tBear) + '°';

    // relative angle (compass-based only)
    var rel = relAngle(tBear, S.compassHeading);

    // smooth display angle
    var delta = shortDelta(S.displayAngle, rel);
    S.displayAngle += delta * S.smoothing;

    // clamp to -180..180
    if (S.displayAngle > 180)  S.displayAngle -= 360;
    if (S.displayAngle < -180) S.displayAngle += 360;
  }

  /* ══════════════════════════════════════
     GEOLOCATION
     ══════════════════════════════════════ */
  function startGeo() {
    if (!navigator.geolocation) {
      statusEl.textContent = 'Geolocation not supported';
      return;
    }
    S.watchId = navigator.geolocation.watchPosition(
      function(pos) {
        S.userLat = pos.coords.latitude;
        S.userLng = pos.coords.longitude;
        var acc = Math.round(pos.coords.accuracy);
        var compassLabel = S.hasCompass ? 'compass active' : 'no compass';
        statusEl.textContent = 'GPS ±' + acc + 'm · ' + compassLabel;
      },
      function(err) {
        statusEl.textContent = 'GPS error: ' + err.message;
      },
      { enableHighAccuracy: true, maximumAge: 0, timeout: 8000 }
    );
  }

  function stopGeo() {
    if (S.watchId !== null) {
      navigator.geolocation.clearWatch(S.watchId);
      S.watchId = null;
    }
  }

  /* ══════════════════════════════════════
     DEVICE ORIENTATION (COMPASS)
     Magnetometer + gyroscope fusion
     ══════════════════════════════════════ */

  function onDeviceOrientation(e) {
    var heading = null;

    // iOS Safari: webkitCompassHeading gives true north heading
    if (e.webkitCompassHeading !== undefined && e.webkitCompassHeading !== null) {
      heading = e.webkitCompassHeading;
    }
    // Android / others: use e.alpha (magnetic north)
    // alpha = 0 means device points to north, increases counterclockwise
    // so compass heading = (360 - alpha) % 360
    else if (e.alpha !== null && e.alpha !== undefined) {
      // If absoluteOrientation event, e.absolute is true
      heading = (360 - e.alpha) % 360;
    }

    if (heading === null) return;

    S.hasCompass = true;
    S.lastCompassRaw = heading;

    // apply calibration offset
    heading = (heading + S.headingOffset + 360) % 360;
    S.compassHeading = heading;
  }

  // try absoluteorientationevent first (Chrome 93+), then fallback
  function startCompass() {
    // iOS permission request
    if (typeof DeviceOrientationEvent !== 'undefined' &&
        typeof DeviceOrientationEvent.requestPermission === 'function') {
      DeviceOrientationEvent.requestPermission()
        .then(function(r) {
          if (r === 'granted') {
            window.addEventListener('deviceorientation', onDeviceOrientation, true);
            window.addEventListener('deviceorientationabsolute', onDeviceOrientation, true);
          } else {
            statusEl.textContent = 'Compass permission denied';
          }
        })
        .catch(function() {
          statusEl.textContent = 'Compass permission error';
        });
    } else {
      // Android / desktop: listen to both events, absolute preferred
      window.addEventListener('deviceorientationabsolute', onDeviceOrientation, true);
      window.addEventListener('deviceorientation', onDeviceOrientation, true);
    }
  }

  function stopCompass() {
    window.removeEventListener('deviceorientation', onDeviceOrientation, true);
    window.removeEventListener('deviceorientationabsolute', onDeviceOrientation, true);
    S.hasCompass = false;
  }

  /* ══════════════════════════════════════
     ANIMATION LOOP
     ══════════════════════════════════════ */
  function tick() {
    updateNav();
    if (S.active) {
      S.sweep += 0.016;
      if (S.sweep > Math.PI * 2) S.sweep -= Math.PI * 2;
    }
    draw();
    requestAnimationFrame(tick);
  }

  /* ══════════════════════════════════════
     CONTROLS
     ══════════════════════════════════════ */
  startBtn.addEventListener('click', function() {
    if (!S.active) {
      S.active = true;
      S.arrived = false;
      S.displayAngle = 0;
      arrivalEl.classList.remove('show');
      startBtn.textContent = 'Stop';
      startBtn.classList.add('running');
      startGeo();
      startCompass();
      statusEl.textContent = 'Acquiring GPS & compass…';
    } else {
      S.active = false;
      startBtn.textContent = 'Start Navigation';
      startBtn.classList.remove('running');
      stopGeo();
      stopCompass();
      distEl.textContent = '---';
      bearingEl.textContent = '---';
      S.userLat = S.userLng = null;
      S.arrived = false;
      arrivalEl.classList.remove('show');
      statusEl.textContent = 'Navigation stopped';
    }
  });

  recalBtn.addEventListener('click', function() {
    // Reset heading offset to zero the current compass reading
    // This makes current facing direction = 0° (forward on radar)
    S.headingOffset = 0;
    S.displayAngle = 0;
    statusEl.textContent = 'Recalibrated';
    setTimeout(function() {
      if (S.active) {
        var compassLabel = S.hasCompass ? 'compass active' : 'no compass';
        statusEl.textContent = 'Recalibrated · ' + compassLabel;
      }
    }, 1200);
  });

  /* ══════════════════════════════════════
     ADMIN PANEL
     ══════════════════════════════════════ */
  adminBtn.addEventListener('click', function() {
    inpLat.value = S.targetLat;
    inpLng.value = S.targetLng;
    inpSmooth.value = S.smoothing;
    rvSmooth.textContent = S.smoothing.toFixed(2);
    inpArrival.value = S.arrivalRadius;
    rvArrival.textContent = S.arrivalRadius + ' m';
    compassStat.textContent = S.hasCompass
      ? 'Compass: active (' + Math.round(S.lastCompassRaw) + '° raw)'
      : 'Compass: not detected';
    overlay.classList.add('open');
  });

  btnClose.addEventListener('click', function() {
    overlay.classList.remove('open');
  });

  inpSmooth.addEventListener('input', function() {
    rvSmooth.textContent = parseFloat(this.value).toFixed(2);
  });

  inpArrival.addEventListener('input', function() {
    rvArrival.textContent = this.value + ' m';
  });

  btnSave.addEventListener('click', function() {
    var la = parseFloat(inpLat.value);
    var ln = parseFloat(inpLng.value);
    if (!isNaN(la) && !isNaN(ln)) {
      S.targetLat = la;
      S.targetLng = ln;
    }
    S.smoothing = parseFloat(inpSmooth.value);
    S.arrivalRadius = parseInt(inpArrival.value, 10);
    saveSettings();
    overlay.classList.remove('open');
    statusEl.textContent = 'Settings saved';
    setTimeout(function() {
      if (S.active) {
        var compassLabel = S.hasCompass ? 'compass active' : 'no compass';
        statusEl.textContent = 'GPS active · ' + compassLabel;
      }
    }, 1200);
  });

  /* ══════════════════════════════════════
     INIT
     ══════════════════════════════════════ */
  loadSettings();
  sizeCanvas();
  window.addEventListener('resize', sizeCanvas);
  tick();
})();
</script>
</body>
</html>
